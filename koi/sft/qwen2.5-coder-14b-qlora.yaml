# axolotl config — QLoRA fine-tune of Qwen2.5-Coder-14B-Instruct (koi, mid tier)
# target hardware: single A100 80GB (Vast.ai spot ~$1.80/hr)
# expected: ~8-12 hours for 5k examples × 2 epochs, ~$15-25 total
# output: LoRA adapter ~120MB, merge to GGUF Q4_K_M → ollama hako-koi-v0.0.1

base_model: Qwen/Qwen2.5-Coder-14B-Instruct
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer
trust_remote_code: true

load_in_4bit: true
adapter: qlora
lora_r: 32
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

datasets:
  - path: dataset.jsonl
    type: chat_template
    chat_template: chatml
    field_messages: messages

sequence_len: 2048
sample_packing: true
pad_to_sequence_len: true

gradient_accumulation_steps: 4
micro_batch_size: 2
num_epochs: 2
optimizer: paged_adamw_8bit
lr_scheduler: cosine
learning_rate: 0.0002
warmup_steps: 50

bf16: auto
tf32: true
gradient_checkpointing: true
flash_attention: true

save_strategy: steps
save_steps: 200
eval_steps: 200
val_set_size: 0.05
logging_steps: 10

output_dir: ./out-hako-koi-v0.0.1
hub_model_id: # set to push to HF, leave blank to keep local
wandb_project: # set to track
wandb_name: hako-koi-v0.0.1

special_tokens:
  pad_token: "<|endoftext|>"
